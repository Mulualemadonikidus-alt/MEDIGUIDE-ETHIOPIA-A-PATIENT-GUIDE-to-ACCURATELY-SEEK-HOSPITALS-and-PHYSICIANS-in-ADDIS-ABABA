name: Autonomic Data Scheduler

on:
  schedule:
    # This runs the action automatically at midnight every Sunday.
    # You can adjust the cron syntax if you need it to run more or less frequently.
    - cron: '0 0 * * 0'
  workflow_dispatch: 
    # This allows you to manually click a "Run workflow" button in the GitHub Actions tab.

jobs:
  update-directory:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the bot can push the new data back to your main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up future runs by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data gathering scripts
        run: |
          python research_hospitals.py
          python research_personnel.py

      - name: Commit and Push changes
        run: |
          # Configure git to use the standard GitHub Actions bot identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage all changes (e.g., updates to hospitals.json.json or other data files)
          git add -A
          
          # Check if there are actually any changes before trying to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated directory data update"
            git push
          else
            echo "No data changes detected. Skipping commit."
          fi
